# ═══════════════════════════════════════════════════════════════════════
#                         STVInsurance Configuration
#                    Система страхования предметов
# ═══════════════════════════════════════════════════════════════════════

# Основные настройки
settings:
  # Время на выкуп застрахованного предмета после смерти (в секундах)
  # 2 часа = 7200 секунд
  redemption-time: 7200

  # Базовое количество слотов для игроков БЕЗ привилегий
  # Игроки с правом stvinsurance.slots.2 получают 2 базовых слота
  # Игроки с правом stvinsurance.slots.3 получают 3 базовых слота
  default-slots: 1

  # Максимальное количество БОНУСНЫХ слотов (от камней апгрейда)
  # Бонусные слоты добавляются к базовым
  #
  # Итоговые максимальные слоты:
  #   • Обычный игрок:       1 базовый + 2 бонусных = 3 слота макс.
  #   • Донатер (slots.2):   2 базовых + 2 бонусных = 4 слота макс.
  #   • Донатер (slots.3):   3 базовых + 2 бонусных = 5 слотов макс.
  max-bonus-slots: 2

  # Интервал автосохранения данных (в минутах)
  auto-save-interval: 5

  # Интервал проверки истекших страховок (в секундах)
  expiry-check-interval: 60

  # Стоимость страхования предмета (0 - бесплатно)
  insurance-cost: 1000

  # Метка страховки в lore предмета
  insurance-lore-mark: "&c&lПредмет застрахован"

# ═══════════════════════════════════════════════════════════════════════
#                         СИСТЕМА СЛОТОВ
# ═══════════════════════════════════════════════════════════════════════
#
# БАЗОВЫЕ СЛОТЫ (от привилегий):
#   • Без прав:              1 слот (default-slots)
#   • stvinsurance.slots.2:  2 слота
#   • stvinsurance.slots.3:  3 слота
#
# БОНУСНЫЕ СЛОТЫ (от камней апгрейда):
#   • Каждый камень дает +1 слот
#   • Максимум: max-bonus-slots (по умолчанию 2)
#
# ИТОГО = базовые + бонусные
#
# Примеры:
#   • Игрок без привилегий с 0 камнями: 1 + 0 = 1 слот
#   • Игрок без привилегий с 2 камнями: 1 + 2 = 3 слота (максимум)
#   • Донатер slots.2 с 0 камнями:      2 + 0 = 2 слота
#   • Донатер slots.2 с 2 камнями:      2 + 2 = 4 слота (максимум)
#   • Донатер slots.3 с 2 камнями:      3 + 2 = 5 слотов (максимум)
#
# ═══════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════
#                         ПРАВА (PERMISSIONS)
# ═══════════════════════════════════════════════════════════════════════
#
# stvinsurance.use         - доступ к /insurance (по умолчанию всем)
# stvinsurance.admin       - доступ к /insadmin
# stvinsurance.slots.2     - 2 базовых слота (для донатеров)
# stvinsurance.slots.3     - 3 базовых слота (для донатеров)
#
# ═══════════════════════════════════════════════════════════════════════

# ═══════════════════════════════════════════════════════════════════════
# КАМНИ АПГРЕЙДА
# ═══════════════════════════════════════════════════════════════════════
# Камни апгрейда управляются плагином STVUpgradeStone.
# Для выдачи камней используйте:
#   /upgradestone give <игрок> [количество]
#
# Камень увеличивает бонусные слоты на 1 (до max-bonus-slots)
# ═══════════════════════════════════════════════════════════════════════

# Настройки стоимости выкупа (монеты Vault)
redemption-cost:
  # Использовать Vault для экономики
  use-vault: true

  # Базовая стоимость выкупа (в валюте)
  base-cost: 1000

  # Множитель стоимости от уровня зачарования предмета
  # Финальная цена = base-cost + (enchantment-multiplier * общий_уровень_зачарований)
  enchantment-multiplier: 100

  # Максимальная стоимость выкупа
  max-cost: 50000

  # Стоимость выкупа для конкретных предметов (переопределяет базовую)
  # Формат: MATERIAL_NAME: стоимость
  custom-costs:
    NETHERITE_SWORD: 5000
    NETHERITE_PICKAXE: 5000
    NETHERITE_AXE: 5000
    NETHERITE_SHOVEL: 4000
    NETHERITE_HOE: 3000
    NETHERITE_HELMET: 6000
    NETHERITE_CHESTPLATE: 8000
    NETHERITE_LEGGINGS: 7000
    NETHERITE_BOOTS: 6000
    DIAMOND_SWORD: 2000
    DIAMOND_PICKAXE: 2000
    DIAMOND_AXE: 2000
    DIAMOND_HELMET: 3000
    DIAMOND_CHESTPLATE: 4000
    DIAMOND_LEGGINGS: 3500
    DIAMOND_BOOTS: 3000
    TOTEM_OF_UNDYING: 10000
    ELYTRA: 15000
    TRIDENT: 8000
    ENCHANTED_GOLDEN_APPLE: 5000

# Настройки стоимости выкупа (донат-валюта PlayerPoints)
redemption-cost-points:
  # Включить выкуп за донат-валюту
  enabled: true

  # Базовая стоимость выкупа (в поинтах)
  base-cost: 100

  # Множитель стоимости от уровня зачарования предмета
  enchantment-multiplier: 10

  # Максимальная стоимость выкупа
  max-cost: 5000

  # Стоимость выкупа для конкретных предметов (в поинтах)
  custom-costs:
    NETHERITE_SWORD: 500
    NETHERITE_PICKAXE: 500
    NETHERITE_AXE: 500
    NETHERITE_SHOVEL: 400
    NETHERITE_HOE: 300
    NETHERITE_HELMET: 600
    NETHERITE_CHESTPLATE: 800
    NETHERITE_LEGGINGS: 700
    NETHERITE_BOOTS: 600
    DIAMOND_SWORD: 200
    DIAMOND_PICKAXE: 200
    DIAMOND_AXE: 200
    DIAMOND_HELMET: 300
    DIAMOND_CHESTPLATE: 400
    DIAMOND_LEGGINGS: 350
    DIAMOND_BOOTS: 300
    TOTEM_OF_UNDYING: 1000
    ELYTRA: 1500
    TRIDENT: 800
    ENCHANTED_GOLDEN_APPLE: 500

# Разрешенные для страхования предметы
# Если список пуст - разрешены все предметы
# Форматы:
#   - MATERIAL_NAME - конкретный предмет
#   - CATEGORY:название - категория предметов
# Доступные категории: TOOLS, ARMOR, WEAPONS, TOTEMS, ELYTRA, TRIDENTS
allowed-items:
  categories:
    - TOOLS
    - ARMOR
    - WEAPONS
    - TOTEMS
    - ELYTRA
    - TRIDENTS
  # Дополнительные предметы (не входящие в категории)
  additional: []

# Запрещенные предметы (имеют приоритет над разрешенными)
blacklisted-items:
  - WOODEN_SWORD
  - WOODEN_PICKAXE
  - WOODEN_AXE
  - WOODEN_SHOVEL
  - WOODEN_HOE
  - STONE_SWORD
  - STONE_PICKAXE
  - STONE_AXE
  - STONE_SHOVEL
  - STONE_HOE
  - LEATHER_HELMET
  - LEATHER_CHESTPLATE
  - LEATHER_LEGGINGS
  - LEATHER_BOOTS

