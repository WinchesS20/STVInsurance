sounds:
  enabled: true

  insure-item:
    sound: ENTITY_PLAYER_LEVELUP
    volume: 1.0
    pitch: 1.5

  uninsure-item:
    sound: ENTITY_ITEM_BREAK
    volume: 1.0
    pitch: 1.0

  redeem-item:
    sound: ENTITY_VILLAGER_YES
    volume: 1.0
    pitch: 1.0

  open-menu:
    sound: BLOCK_CHEST_OPEN
    volume: 0.5
    pitch: 1.2

  error:
    sound: ENTITY_VILLAGER_NO
    volume: 1.0
    pitch: 1.0

  upgrade:
    sound: UI_TOAST_CHALLENGE_COMPLETE
    volume: 1.0
    pitch: 1.0

  item-expired:
    sound: ENTITY_WITHER_DEATH
    volume: 0.5
    pitch: 1.5

# ═══════════════════════════════════════════════════════════════════════
#                         БАЗА ДАННЫХ
# ═══════════════════════════════════════════════════════════════════════

storage:
  # Тип хранилища: YAML или MYSQL
  type: YAML

  # Настройки MySQL (если type: MYSQL)
  mysql:
    host: localhost
    port: 3306
    database: stvinsurance
    username: root
    password: password
    table-prefix: stv_

    # Пул соединений
    pool:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000